{% extends 'base/base.html' %}
{% load static %}

{% block content %}

    <div class="content-wrapper dark">
        <!-- Content Header (Page header) -->
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0">Produtos</h1>
                    </div><!-- /.col -->
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="#">Home</a></li>
                            <li class="breadcrumb-item active">Produtos</li>
                        </ol>
                    </div><!-- /.col -->
                </div><!-- /.row -->
            </div><!-- /.container-fluid -->
        </div>
        <!-- /.content-header -->

        <!-- Main content -->
        <section class="content">
            <div id="modal-default" class="modal fade" role="document">
                <div id="dialog" class="modal-dialog" hx-target="this"></div>
            </div>

            <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header">
                    <button type="button" class="ml-2 mb-1 close" data-dismiss="toast" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div id="toast-body" class="toast-body">
                    
                </div>
            </div>

            <div class="container-fluid dark">
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <div class="row">
                                    <div class="col-sm-2">

                                        <button hx-get="{% url 'produtos:produto_add' %}" hx-target="#dialog" class="btn btn-primary">
                                            Adicionar
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="card-body table-responsive p-0">
                                <table id="example1" class="table table-hover text-nowrap">
                                    <thead>
                                    <tr>
                                        <th>Nome</th>
                                        <th>Fabricante</th>
                                        <th>Fornecedor</th>
                                        <th>Valor</th>
                                        <th>Link</th>
                                        <th>Editar</th>

                                    </tr>
                                    </thead>
                                    <tbody hx-trigger="load, produtoListChanged from:body" hx-get="{% url 'produtos:produto_list' %}" hx-target="this">
                                    <tr>
                                        <td class="spinner-border" role="status">
                                            <span class="visually-hidden">Loading...</span>
                                        </td>
                                    </tr>
                                    </tbody>
                                    <tfoot>
                                    <tr>
                                        <th>Nome</th>
                                        <th>Fabricante</th>
                                        <th>Fornecedor</th>
                                        <th>Valor</th>
                                        <th>Link</th>
                                        <th>Editar</th>
                                    </tr>
                                    </tfoot>
                                </table>

                            </div>
                        </div>
                        <!-- /.card -->
                    </div>
                </div>
            </div><!-- /.container-fluid -->
        </section>
        <!-- /.content -->
    </div>

{% endblock content %}

{% block scripts %}


{% endblock scripts %}
